<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noon GCC April Campaign 2026 | Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050505;
            --glass-panel: rgba(15, 15, 15, 0.85);
            --glass-border: rgba(255, 255, 255, 0.06);
            --noon-yellow: #feee00;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent-light: #ffffff;
        }
        * { box-sizing: border-box; outline: none; }
        
        /* Animated Breathing Background */
        @keyframes bgGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        body {
            font-family: 'Outfit', 'Cairo', sans-serif;
            background: linear-gradient(-45deg, #050505, #111111, #1a1a00, #0a0a0a);
            background-size: 400% 400%;
            animation: bgGradient 20s ease infinite;
            color: var(--text-main);
            margin: 0; padding: 20px; min-height: 100vh;
            display: flex; justify-content: center; overflow: hidden;
            backdrop-filter: blur(10px);
        }

        /* Entrance Animation */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(40px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .main-grid {
            display: grid; grid-template-columns: 380px 1fr;
            gap: 24px; width: 100%; max-width: 1600px; height: 95vh;
        }

        .panel {
            background: var(--glass-panel); 
            border: 1px solid var(--glass-border);
            border-radius: 20px; display: flex; flex-direction: column;
            position: relative; overflow: hidden; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            opacity: 0;
            animation: slideUpFade 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .sidebar { padding: 25px; gap: 12px; z-index: 2; overflow-y: auto; animation-delay: 0.1s; }
        .content-panel { background: rgba(5,5,5,0.9); animation-delay: 0.25s; }

        .logo-header { text-align: center; border-bottom: 1px solid var(--glass-border); padding-bottom: 16px; margin-bottom: 8px; }
        .logo-circle {
            width: 52px; height: 52px; background: var(--noon-yellow); border-radius: 50%;
            margin: 0 auto 10px; display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: 900; color: #000;
            box-shadow: 0 0 20px rgba(254, 238, 0, 0.2);
            transition: transform 0.3s ease;
        }
        .logo-circle:hover { transform: rotate(10deg) scale(1.1); }

        .field-group { margin-bottom: 4px; }
        .field-group label { 
            display: block; font-size: 11px; color: var(--text-muted); 
            margin-bottom: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; 
            transition: color 0.3s;
        }
        
        /* Enhanced Inputs */
        input, select, textarea {
            width: 100%; padding: 10px 14px; background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            color: #fff; font-family: inherit; font-size: 13.5px; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        textarea { resize: vertical; min-height: 58px; line-height: 1.5; }
        input:hover, select:hover { border-color: rgba(255,255,255,0.2); background: rgba(0,0,0,0.7); }
        input:focus, select:focus, textarea:focus { 
            border-color: var(--noon-yellow); 
            background: rgba(20,20,0,0.6); 
            box-shadow: 0 0 0 3px rgba(254, 238, 0, 0.1);
            transform: translateY(-1px);
        }
        .field-group:focus-within label { color: var(--accent-light); }

        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .calc-display {
            margin-top: 6px; padding: 9px 12px; border-radius: 8px; font-size: 11.5px; display: none;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        
        .calc-fee { background: rgba(254,238,0,0.06); border: 1px solid rgba(254,238,0,0.2); color: var(--noon-yellow); }
        
        .divider { border: none; border-top: 1px solid var(--glass-border); margin: 10px 0; }
        
        /* Animated Button */
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 15px rgba(254,238,0,0.2); }
            50% { box-shadow: 0 0 25px rgba(254,238,0,0.5); }
            100% { box-shadow: 0 0 15px rgba(254,238,0,0.2); }
        }
        .gen-button {
            margin-top: 10px; width: 100%; padding: 15px;
            background: linear-gradient(135deg, var(--noon-yellow) 0%, #e6d700 100%);
            border: none; border-radius: 12px; color: #000; font-weight: 800; font-size: 14.5px;
            cursor: pointer; text-transform: uppercase; letter-spacing: 1.5px; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            animation: pulseGlow 3s infinite;
        }
        .gen-button::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg); transition: 0.5s;
        }
        .gen-button:hover { transform: translateY(-3px) scale(1.02); }
        .gen-button:hover::after { left: 150%; }

        .header-nav {
            padding: 15px 25px; border-bottom: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center; height: 70px;
            background: rgba(255,255,255,0.02);
        }
        
        .tabs { display: flex; gap: 10px; background: rgba(0,0,0,0.4); padding: 4px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .tab {
            background: transparent; border: none; color: var(--text-muted);
            padding: 8px 18px; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 12.5px; 
            transition: all 0.3s; position: relative;
        }
        .tab:hover { color: #fff; }
        .tab.active { background: #222; color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .subject-bar {
            padding: 0 25px; background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex; justify-content: space-between; align-items: center; height: 50px;
        }
        .subject-text { font-family: monospace; color: var(--accent-light); font-size: 13.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80%; }
        
        .viewport { position: relative; flex-grow: 1; overflow: hidden; }
        .view-content {
            display: none; height: 100%; overflow-y: auto;
            position: absolute; width: 100%; top: 0; left: 0; padding-bottom: 100px;
            animation: fadeIn 0.4s ease;
        }
        .view-content.active { display: block; }
        
        .email-render { background: #fff; color: #333; padding: 40px; min-height: 100%; }
        .checklist-render { background: #111; color: #eee; padding: 40px; font-family: 'Courier New', monospace; white-space: pre-wrap; line-height: 1.7; font-size: 13.5px; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--noon-yellow); }

        .fab-wrapper {
            position: absolute; bottom: 30px; right: 30px; z-index: 100;
            pointer-events: none; width: 100%; display: flex; justify-content: flex-end;
        }
        .fab-btn {
            pointer-events: auto; background: #fff; color: #000; border: none;
            padding: 14px 28px; border-radius: 50px; font-weight: 800; font-size: 14.5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 0 2px var(--noon-yellow); 
            cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .fab-btn:hover { 
            transform: scale(1.05) translateY(-2px); 
            background: var(--noon-yellow); 
            box-shadow: 0 15px 40px rgba(254,238,0,0.4), 0 0 0 2px #fff; 
        }
    </style>
</head>
<body>
<div class="main-grid">

    <!-- SIDEBAR -->
    <div class="panel sidebar">
        <div class="logo-header">
            <div class="logo-circle">n</div>
            <h1 style="font-size:15px;margin:0;color:#fff;letter-spacing:1px;">CAMPAIGN HUB</h1>
            <span style="font-size:10.5px;color:var(--noon-yellow);font-weight:700;letter-spacing:0.5px;">NOON GCC APRIL 2026</span>
        </div>

        <div class="field-group">
            <label>📍 Country</label>
            <select id="country" onchange="updateSubject()">
                <option value="Qatar">Qatar</option>
                <option value="Bahrain">Bahrain</option>
                <option value="Oman">Oman</option>
                <option value="Kuwait">Kuwait</option>
            </select>
        </div>

        <div class="field-group">
            <label>👤 Influencer Name</label>
            <input type="text" id="name" placeholder="Enter Name">
        </div>

        <div class="field-group">
            <label>📱 Agreed Platform(s)</label>
            <input type="text" id="platform" placeholder="e.g. Instagram Reels & TikTok">
        </div>

        <div class="field-group">
            <label>👥 Followers Count</label>
            <input type="number" id="followers" placeholder="e.g. 100000" oninput="calcKPI()">
        </div>

        <div class="row-2">
            <div class="field-group">
                <label>🎯 KPI Target %</label>
                <input type="number" id="kpiPercent" value="50" min="1" max="100" oninput="calcKPI()">
            </div>
            <!-- Target Views is now an editable input -->
            <div class="field-group">
                <label>👁️ Target Views</label>
                <input type="number" id="targetViews" placeholder="Auto Calc">
            </div>
        </div>

        <div class="row-2">
            <div class="field-group">
                <label>💰 Agreed Fee (AED)</label>
                <input type="number" id="price" placeholder="500" oninput="calcFee()">
            </div>
            <div class="field-group">
                <label>🚀 Go Live Date</label>
                <input type="date" id="liveDate">
            </div>
        </div>
        <div class="calc-display calc-fee" id="feeDisplay"></div>

        <div class="field-group">
            <label>✍️ Sender Name</label>
            <input type="text" id="senderName" value="Mahmoud">
        </div>

        <hr class="divider">
        <button class="gen-button" onclick="generateBrief()">⚡ Generate Brief</button>
        <div style="margin-top:auto;padding-top:10px;font-size:11px;color:rgba(255,255,255,0.3);text-align:center;font-weight:600;">v26.4 | AI Enhanced Edition</div>
    </div>

    <!-- CONTENT PANEL -->
    <div class="panel content-panel">
        <div class="header-nav">
            <div style="font-weight:800;font-size:15px;color:#fff;letter-spacing:1px;">OUTPUT PREVIEW</div>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('email',event)">Email Body</button>
                <button class="tab" onclick="switchTab('eng',event)">Brief (EN)</button>
                <button class="tab" onclick="switchTab('ar',event)">Brief (AR)</button>
            </div>
        </div>
        <div class="subject-bar">
            <div style="display:flex;align-items:center;gap:12px;flex:1;">
                <span style="color:var(--text-muted);font-weight:bold;font-size:12px;">SUBJECT:</span>
                <span class="subject-text" id="subjectText">Waiting for generation...</span>
            </div>
            <button style="background:none;border:none;color:#fff;cursor:pointer;font-size:18px;transition:0.3s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'" onclick="copySubject()" title="Copy Subject">📋</button>
        </div>
        <div class="viewport">
            <div id="view-email" class="view-content active">
                <div id="render-email" class="email-render" contenteditable="false">
                    <div style="text-align:center;padding-top:150px;color:#888;">
                        <div style="font-size:45px;margin-bottom:15px;animation: pulseGlow 2s infinite;">👋</div>
                        Fill in the details and click "Generate Brief"
                    </div>
                </div>
            </div>
            <div id="view-eng" class="view-content">
                <div id="render-eng" class="checklist-render"></div>
            </div>
            <div id="view-ar" class="view-content">
                <div id="render-ar" class="checklist-render" dir="rtl" style="text-align:right;"></div>
            </div>
        </div>
        <div class="fab-wrapper">
            <button id="btn-email" class="fab-btn" onclick="copyRichText('render-email',this)">Copy Email Content</button>
            <button id="btn-eng"   class="fab-btn" style="display:none;" onclick="copyText('render-eng',this)">Copy English Brief</button>
            <button id="btn-ar"    class="fab-btn" style="display:none;" onclick="copyText('render-ar',this)">نسخ البريف العربي</button>
        </div>
    </div>
</div>

<script>
const LOGO_URL      = "https://f.nooncdn.com/s/app/com/noon/design-system/logos/noon-logo-ar.svg";
const TRANSFER_FEE  = 30;
const CAMPAIGN_END  = "May 1, 2026";
const PAYMENT_DATE  = "June 1, 2026";
const CAMPAIGN_NAME = "Noon GCC April Campaign 2026";
// Hardcoded Google Drive URL
const HARDCODED_LOGO_URL = "https://drive.google.com/drive/folders/17Mp6al1btsHeSDRo19z6J0DLT4177JAS";

function calcFee() {
    const p = parseFloat(document.getElementById('price').value)||0;
    const d = document.getElementById('feeDisplay');
    if (p>0) { d.style.display='block'; d.innerHTML=`💰 ${p} AED + ${TRANSFER_FEE} AED (transfer) = <strong style="color:#fff;">${p+TRANSFER_FEE} AED total</strong>`; }
    else d.style.display='none';
}

function calcKPI() {
    const f = parseInt(document.getElementById('followers').value)||0;
    const pct = parseFloat(document.getElementById('kpiPercent').value)||50;
    const targetInput = document.getElementById('targetViews');
    if (f > 0) {
        targetInput.value = Math.round(f * pct / 100);
    } else {
        targetInput.value = '';
    }
}

function generateBrief() {
    const country   = document.getElementById('country').value;
    const name      = document.getElementById('name').value || "Partner";
    const sender    = document.getElementById('senderName').value || "Mahmoud";
    const platform  = document.getElementById('platform').value || "[Platform(s) to be confirmed]";
    const rawPrice  = parseFloat(document.getElementById('price').value)||0;
    const totalFee  = rawPrice + TRANSFER_FEE;
    const followers = parseInt(document.getElementById('followers').value)||0;
    const kpiPct    = parseFloat(document.getElementById('kpiPercent').value)||50;
    
    // Read from the editable targetViews input
    const targetV   = parseInt(document.getElementById('targetViews').value) || null;

    const liveStr = document.getElementById('liveDate').value
        ? new Date(document.getElementById('liveDate').value).toLocaleDateString('en-GB') : "[TBD]";

    const subject = `${CAMPAIGN_NAME} | Collaboration Opportunity – ${country}`;
    document.getElementById('subjectText').innerText = subject;

    const kpiLabel = targetV
        ? `${targetV.toLocaleString()} views (${kpiPct}% of ${followers.toLocaleString()} followers)`
        : `${kpiPct}% of your total followers`;

    const logoRowHTML = `<li><strong>Official Logo:</strong> You are <u>NOT</u> allowed to use old noon logos. Use ONLY the official file: <a href="${HARDCODED_LOGO_URL}" style="color:#0050b3;font-weight:bold;">📥 Download Official Logo Here</a></li>`;
    const logoRowText = `- Logo: Do NOT use old logos. Download official file: ${HARDCODED_LOGO_URL}`;

    /* ── EMAIL ── */
    const emailHTML = `<table width="100%" cellpadding="0" cellspacing="0" border="0" style="font-family:Arial,sans-serif;color:#333;line-height:1.65;font-size:15px;max-width:740px;margin:0 auto;background:#fff;">
  <tr>
    <td align="center" style="background:#feee00;padding:22px 0;">
      <img src="${LOGO_URL}" alt="noon" width="100" style="display:block;margin:0 auto;">
      <div style="margin-top:8px;font-size:12px;font-weight:700;color:#000;letter-spacing:1.5px;text-transform:uppercase;">${CAMPAIGN_NAME}</div>
    </td>
  </tr>
  <tr><td style="padding:38px 35px;">

    <p style="margin-top:0;">Hi <strong>${name}</strong>,<br>Hope you're doing great! 🌟</p>
    <p>We're excited to invite you to collaborate on the <strong>${CAMPAIGN_NAME}</strong> — a multi-phase campaign running across the GCC (Qatar, Bahrain, Oman &amp; Kuwait).</p>
    <p>Please read the full brief below carefully. All video creation details, script guidance, and posting instructions will be sent to you via <strong>WhatsApp</strong> once you confirm your participation by replying to this email.</p>

    <!-- CAMPAIGN WINDOWS -->
    <h3 style="border-bottom:3px solid #feee00;display:inline-block;padding-bottom:5px;margin-top:25px;">📅 Campaign Windows &amp; Categories</h3>
    <table width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;font-size:13px;margin-top:10px;">
      <thead>
        <tr style="background:#feee00;color:#000;">
          <th style="padding:10px 12px;text-align:left;">Phase</th>
          <th style="padding:10px 12px;text-align:left;">Dates</th>
          <th style="padding:10px 12px;text-align:left;">Categories &amp; Notes</th>
        </tr>
      </thead>
      <tbody>
        <tr style="background:#fafafa;border-bottom:1px solid #eee;">
          <td style="padding:10px 12px;font-weight:700;">🛍️ Grand Lifestyle Sale</td>
          <td style="padding:10px 12px;white-space:nowrap;color:#555;">Apr 12–13</td>
          <td style="padding:10px 12px;color:#444;">Home, Fashion, W&amp;E, Footwear, Beauty, Fitness<br><span style="font-size:12px;color:#888;">Code <strong>PROMO10</strong> on stories &amp; caption</span></td>
        </tr>
        <tr style="background:#fff;border-bottom:1px solid #eee;">
          <td style="padding:10px 12px;font-weight:700;">🌿 Gap – Light Phase</td>
          <td style="padding:10px 12px;white-space:nowrap;color:#555;">Apr 14–16</td>
          <td style="padding:10px 12px;color:#444;">Beauty, Fashion basics, Home essentials, Footwear, Fitness, Coupons/Bundles<br><span style="font-size:12px;color:#888;">Code <strong>PROMO10</strong>. Tease Mega Tech Festival (Apr 17–20) — 10% mention</span></td>
        </tr>
        <tr style="background:#fafafa;border-bottom:1px solid #eee;">
          <td style="padding:10px 12px;font-weight:700;">💻 Mega Tech Festival</td>
          <td style="padding:10px 12px;white-space:nowrap;color:#555;">Apr 17–20</td>
          <td style="padding:10px 12px;color:#444;">TVs, Appliances, Laptops, Gaming, Telco<br><span style="font-size:12px;color:#888;">Code <strong>PROMO10</strong> on stories &amp; caption</span></td>
        </tr>
        <tr style="background:#fff;border-bottom:1px solid #eee;">
          <td style="padding:10px 12px;font-weight:700;">🎮 Gap – Light Phase</td>
          <td style="padding:10px 12px;white-space:nowrap;color:#555;">Apr 21–23</td>
          <td style="padding:10px 12px;color:#444;">Tech accessories, Gaming accessories, Wearables, Fashion accessories, Baby/Kids, Budget tech<br><span style="font-size:12px;color:#888;">Code <strong>PROMO10</strong>. Tease End of Month Sale — 10% mention</span></td>
        </tr>
        <tr style="background:#fafafa;">
          <td style="padding:10px 12px;font-weight:700;">🎉 End of Month Sale</td>
          <td style="padding:10px 12px;white-space:nowrap;color:#555;">Apr 24–May 2</td>
          <td style="padding:10px 12px;color:#444;">Platform-wide — All categories<br><span style="font-size:12px;color:#888;">Code <strong>PROMO10</strong>. Tease 10% about May campaigns</span></td>
        </tr>
      </tbody>
    </table>

    <!-- KEY MESSAGES -->
    <h3 style="border-bottom:3px solid #feee00;display:inline-block;padding-bottom:5px;margin-top:28px;">🚀 Key Messages</h3>
    <div style="background:#fafafa;padding:15px 20px;border-left:4px solid #333;border-radius:0 6px 6px 0;">
      <ul style="margin:0;padding-left:20px;">
        <li style="margin-bottom:7px;">noon is your one-stop shop — lifestyle, tech, home &amp; more, all in one app.</li>
        <li style="margin-bottom:7px;">Available in Qatar, Bahrain, Oman &amp; Kuwait.</li>
        <li style="margin-bottom:7px;">Use promo code <strong>PROMO10</strong> for an exclusive discount.</li>
        <li style="margin-bottom:7px;">Download the <strong>noon app</strong> now to enjoy a seamless shopping experience and exclusive deals!</li>
        <li>Fast, reliable delivery — straight to your door.</li>
      </ul>
    </div>

    <!-- CREATIVE DIRECTION -->
    <h3 style="border-bottom:3px solid #feee00;display:inline-block;padding-bottom:5px;margin-top:28px;">🎨 Creative Direction</h3>
    <div style="background:#fafafa;padding:18px 20px;border-radius:8px;border:1px solid #eee;">
      <strong style="display:block;margin-bottom:10px;">Content Guidelines:</strong>
      <ul style="margin:0;padding-left:20px;color:#444;">
        <li style="margin-bottom:7px;"><strong>Tone:</strong> Friendly, trustworthy, family-oriented, simple &amp; clear.</li>
        <li style="margin-bottom:7px;"><strong>Focus:</strong> Savings, product variety, ease of use, app-first awareness.</li>
        <li style="margin-bottom:7px;"><strong>Video Specs:</strong> 30–45 sec max | High quality | Good natural lighting | Clear audio | No heavy filters.</li>
        <li style="margin-bottom:7px;">Showcase real shopping moments: browsing products, unboxing, styling.</li>
        <li style="margin-bottom:7px;">Include app screen recording or floating screen visuals.</li>
        <li>Show adding items to cart + receiving delivery at the door.</li>
      </ul>
    </div>

    <!-- FULL BRIEF BOX -->
    <div style="background:#f5f5f5;border:2px solid #222;border-radius:10px;padding:25px;margin-top:28px;">
      <strong style="font-size:17px;display:block;margin-bottom:20px;color:#111;text-transform:uppercase;letter-spacing:0.5px;">📋 Full Campaign Brief</strong>

      <!-- Review & Approval -->
      <div style="margin-bottom:22px;">
        <strong style="color:#111;font-size:14px;display:block;margin-bottom:9px;border-bottom:1px solid #ddd;padding-bottom:6px;">✅ Review &amp; Approval Process</strong>
        <ul style="margin:0;padding-left:20px;font-size:14px;color:#444;line-height:1.85;">
          <li><strong>Do NOT post</strong> until your draft is reviewed and approved by our team.</li>
          <li>All content (video + caption) must be shared with us <strong>before posting</strong>.</li>
          <li>Content is subject to edits &amp; feedback — please expect <strong>2–3 rounds of revisions</strong> before final approval.</li>
          <li>Posting is only allowed after receiving <strong>explicit written approval</strong> from your point of contact.</li>
        </ul>
      </div>

/* FIX FOR COPYING TEXT: 
   Using a temporary textarea fallback ensures the exact text formatting is copied, 
   bypassing browser permission issues in iframes.
*/
function copyText(id, btn) {
    const textToCopy = document.getElementById(id).innerText;
    const tempTextArea = document.createElement("textarea");
    tempTextArea.value = textToCopy;
    document.body.appendChild(tempTextArea);
    tempTextArea.select();
    document.execCommand("copy");
    document.body.removeChild(tempTextArea);
    
    flash(btn, btn.innerText);
}

function copySubject() {
    const t = document.getElementById('subjectText').innerText;
    if (t.includes("Waiting")) return;
    
    const tempTextArea = document.createElement("textarea");
    tempTextArea.value = t;
    document.body.appendChild(tempTextArea);
    tempTextArea.select();
    document.execCommand("copy");
    document.body.removeChild(tempTextArea);
    
    alert("Subject Copied Successfully!");
}

function copyRichText(id, btn) {
    const node = document.getElementById(id);
    const range = document.createRange();
    range.selectNodeContents(node);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand('copy');
    flash(btn, btn.innerText);
}

function flash(btn, orig) {
    btn.innerText = "COPIED! ✅";
    btn.style.background = "#00ff88"; 
    btn.style.color = "#000";
    btn.style.borderColor = "#00ff88";
    btn.style.boxShadow = "0 10px 30px rgba(0,255,136,0.5)";
    setTimeout(() => { 
        btn.innerText=orig; 
        btn.style.background="#fff"; 
        btn.style.color="#000";
        btn.style.borderColor="var(--noon-yellow)"; 
        btn.style.boxShadow="0 10px 30px rgba(0,0,0,0.5), 0 0 0 2px var(--noon-yellow)";
    }, 2000);
}

function updateSubject() {
    const c = document.getElementById('country').value;
