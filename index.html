<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noon Eid Campaign Generator</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* ========================================
           1. CSS VARIABLES & RESET
           ========================================
        */
        :root {
            --bg-deep: #050505;
            --glass-panel: rgba(20, 20, 20, 0.95);
            --glass-border: rgba(255, 255, 255, 0.08);
            --noon-yellow: #feee00;
            --text-main: #ffffff;
            --accent-cyan: #00e5ff;
            --alert-red: #ff4d4d;
        }

        * { box-sizing: border-box; outline: none; }

        body {
            font-family: 'Outfit', 'Cairo', sans-serif;
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at 50% 0%, rgba(254, 238, 0, 0.08) 0%, transparent 60%);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        /* LAYOUT GRID */
        .main-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
            width: 100%;
            max-width: 1600px;
            height: 95vh;
        }

        .panel {
            background: var(--glass-panel);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* SIDEBAR STYLES */
        .sidebar { padding: 25px; gap: 15px; z-index: 2; overflow-y: auto; }
        
        .logo-header { text-align: center; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; margin-bottom: 5px; }
        .logo-circle {
            width: 50px; height: 50px; background: var(--noon-yellow); border-radius: 50%;
            margin: 0 auto 10px; display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: 900; color: #000;
        }
        
        .field-group label { display: block; font-size: 11px; color: var(--accent-cyan); margin-bottom: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.4);
            border: 1px solid var(--glass-border); border-radius: 8px;
            color: #fff; font-family: inherit; font-size: 14px; transition: 0.3s;
        }
        input:focus, select:focus { border-color: var(--noon-yellow); background: rgba(0,0,0,0.6); }

        .gen-button {
            margin-top: 10px; width: 100%; padding: 16px;
            background: linear-gradient(135deg, var(--noon-yellow) 0%, #d4c600 100%);
            border: none; border-radius: 10px; color: #000; font-weight: 800; font-size: 15px;
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .gen-button:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(254, 238, 0, 0.2); }

        /* CONTENT PANEL STYLES */
        .content-panel { background: #000; }
        
        .header-nav {
            padding: 15px 25px; border-bottom: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center; height: 70px;
            background: rgba(255,255,255,0.03);
        }
        .tabs { display: flex; gap: 8px; }
        .tab {
            background: transparent; border: 1px solid #333; color: #888;
            padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px;
            transition: 0.3s;
        }
        .tab.active { background: #222; color: #fff; border-color: #555; }

        .subject-bar {
            padding: 0 25px; background: rgba(0, 229, 255, 0.05);
            border-bottom: 1px solid rgba(0, 229, 255, 0.15);
            display: flex; justify-content: space-between; align-items: center; height: 50px;
        }
        .subject-text { font-family: monospace; color: var(--accent-cyan); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80%; }

        /* VIEWPORT */
        .viewport {
            position: relative;
            flex-grow: 1;
            overflow: hidden;
        }

        .view-content {
            display: none;
            height: 100%;
            overflow-y: auto;
            position: absolute; width: 100%; top: 0; left: 0;
            padding-bottom: 100px;
        }
        .view-content.active { display: block; }

        /* RENDER STYLES */
        .email-render { background: #fff; color: #333; padding: 40px; min-height: 100%; }
        .checklist-render { background: #111; color: #eee; padding: 40px; font-family: 'Courier New', monospace; white-space: pre-wrap; line-height: 1.6; font-size: 14px; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--noon-yellow); }

        /* FAB */
        .fab-wrapper {
            position: absolute; bottom: 30px; right: 30px;
            z-index: 100; pointer-events: none; width: 100%;
            display: flex; justify-content: flex-end;
        }
        .fab-btn {
            pointer-events: auto; background: #fff; color: #000; border: 2px solid var(--noon-yellow);
            padding: 14px 28px; border-radius: 50px; font-weight: 800; font-size: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: pointer;
            transition: 0.2s;
        }
        .fab-btn:hover { transform: scale(1.05); background: var(--noon-yellow); }
    </style>
</head>
<body>

    <div class="main-grid">
        <!-- SIDEBAR -->
        <div class="panel sidebar">
            <div class="logo-header">
                <div class="logo-circle">n</div>
                <h1 style="font-size:16px; margin:0; color:#fff; letter-spacing:1px;">CAMPAIGN HUB</h1>
                <span style="font-size:10px; color:#666;">EID CAMPAIGN | GCC</span>
            </div>
            
            <div class="field-group">
                <label>📍 Country</label>
                <select id="country" onchange="updateSubject()">
                    <option value="Qatar">Qatar</option>
                    <option value="Bahrain">Bahrain</option>
                    <option value="Oman">Oman</option>
                    <option value="Kuwait">Kuwait</option>
                </select>
            </div>
            <div class="field-group">
                <label>👤 Influencer Name</label>
                <input type="text" id="name" placeholder="Enter Name">
            </div>
            <div class="field-group">
                <label>💰 Fee (AED)</label>
                <input type="number" id="price" placeholder="500">
            </div>
            <div class="field-group">
                <label>📅 Video Deadline Date</label>
                <input type="date" id="deadlineDate">
            </div>
            <div class="field-group">
                <label>🚀 Go Live Date</label>
                <input type="date" id="liveDate">
            </div>
            <div class="field-group">
                <label>✍️ Sender Name</label>
                <input type="text" id="senderName" value="Mahmoud">
            </div>

            <button class="gen-button" onclick="generateBrief()">Generate Brief</button>
            
            <div style="margin-top:auto; font-size:10px; color:#444; text-align:center;">
                v25.0 | Eid Campaign V1
            </div>
        </div>

        <!-- CONTENT PANEL -->
        <div class="panel content-panel">
            <div class="header-nav">
                <div style="font-weight:700; font-size:14px; color:#fff;">OUTPUT PREVIEW</div>
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('email')">Email Body</button>
                    <button class="tab" onclick="switchTab('eng')">Brief (EN)</button>
                    <button class="tab" onclick="switchTab('ar')">Brief (AR)</button>
                </div>
            </div>

            <div class="subject-bar">
                <div style="display:flex; align-items:center; gap:10px; flex:1;">
                    <span style="color:#fff; font-weight:bold; font-size:12px;">SUBJECT:</span>
                    <span class="subject-text" id="subjectText">Waiting for generation...</span>
                </div>
                <button style="background:none; border:none; color:#fff; cursor:pointer; font-size:16px;" onclick="copySubject()" title="Copy Subject">📋</button>
            </div>

            <div class="viewport">
                <!-- EMAIL VIEW -->
                <div id="view-email" class="view-content active">
                    <div id="render-email" class="email-render" contenteditable="false">
                        <div style="text-align:center; padding-top:150px; color:#888;">
                            <div style="font-size:40px; margin-bottom:10px;">👋</div>
                            Fill details and click "Generate Brief"
                        </div>
                    </div>
                </div>

                <!-- ENG VIEW -->
                <div id="view-eng" class="view-content">
                    <div id="render-eng" class="checklist-render"></div>
                </div>

                <!-- AR VIEW -->
                <div id="view-ar" class="view-content">
                    <div id="render-ar" class="checklist-render" dir="rtl" style="text-align: right;"></div>
                </div>
            </div>

            <div class="fab-wrapper">
                <button id="btn-email" class="fab-btn" onclick="copyRichText('render-email', this)">Copy Email Content</button>
                <button id="btn-eng" class="fab-btn" style="display:none;" onclick="copyText('render-eng', this)">Copy English Brief</button>
                <button id="btn-ar" class="fab-btn" style="display:none;" onclick="copyText('render-ar', this)">نسخ البريف العربي</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONSTANTS ---
        const LOGO_URL = "https://f.nooncdn.com/s/app/com/noon/design-system/logos/noon-logo-ar.svg";
        
        // --- TEXT BLOCKS ---
        const SCRIPT_DIRECTION = `1. “العيد قرب، وكل اللي أحتاجه لقيته بمكان واحد! من ملابس العيد للهدايا - كل شي على نون. حمّلوا التطبيق الآن.”
2. “ليش تلف وتدور وتتعب نفسك قبل العيد؟ تطبيق نون وفّر لنا كل التجهيزات من لبس، ديكور، وضيافة ويوصل للباب.”
3. “تجهيزات العيد صارت أسهل مع نون! كل شي تحتاجه أنت وعيلتك بضغطة زر وتوصيل سريع.”`;

        function generateBrief() {
            // Inputs
            const country = document.getElementById('country').value;
            const name = document.getElementById('name').value || "Partner";
            const sender = document.getElementById('senderName').value || "Mahmoud";
            let rawPrice = document.getElementById('price').value || "0";
            const price = rawPrice + " AED"; // CHANGED TO AED
            
            const deadlineInput = document.getElementById('deadlineDate').value;
            const liveInput = document.getElementById('liveDate').value;
            const deadlineStr = deadlineInput ? new Date(deadlineInput).toLocaleDateString('en-GB') : "[TBD]";
            const liveStr = liveInput ? new Date(liveInput).toLocaleDateString('en-GB') : "[TBD]";

            // Update Subject
            const subject = `Eid Campaign Collaboration | noon GCC - ${country}`;
            document.getElementById('subjectText').innerText = subject;

            // ===========================================
            // 1. EMAIL GENERATION
            // ===========================================
            const emailHTML = `
            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="font-family: Arial, sans-serif; color: #333; line-height: 1.6; font-size: 15px; max-width: 720px; margin: 0 auto; background: #fff;">
                <tr>
                    <td align="center" style="background-color: #feee00; padding: 25px 0;">
                        <img src="${LOGO_URL}" alt="noon" width="100" style="display: block;">
                    </td>
                </tr>
                <tr>
                    <td align="left" style="padding: 40px 30px;">
                        
                        <p style="margin-top:0;">Hi <strong>${name}</strong>,<br>
                        We hope you’re doing well ✨</p>

                        <p>We’re excited to reach out regarding the <strong>noon Eid Campaign</strong> across the GCC (Qatar, Bahrain, Oman, and Kuwait).</p>
                        
                        <p>With Eid Al-Fitr approaching, this campaign aims to position noon as the one-stop destination for all Eid needs—making preparation easier, smarter, and stress-free through one trusted app.</p>

                        <!-- CAMPAIGN OVERVIEW -->
                        <h3 style="border-bottom: 3px solid #feee00; display:inline-block; padding-bottom:5px; margin-top:25px;">🚀 Campaign Key Messages</h3>
                        <div style="background: #fafafa; padding: 15px; border-left: 4px solid #333;">
                            <ul style="margin:0; padding-left:20px;">
                                <li style="margin-bottom:8px;">noon is your one-stop shop for Eid.</li>
                                <li style="margin-bottom:8px;">The noon app is now available in Qatar, Bahrain, Oman, and Kuwait.</li>
                                <li style="margin-bottom:8px;">Shop early and avoid last-minute Eid stress with wide product variety.</li>
                                <li><strong>Delivery Timeline:</strong> Reliable delivery within 3–7 days (Shipped from noon’s main warehouse).</li>
                            </ul>
                        </div>

                        <!-- CATEGORIES -->
                        <div style="background: #fafafa; padding: 20px; border-radius: 8px; border: 1px solid #eee; margin-top:25px; margin-bottom:30px;">
                            <strong style="color:#333; display:block; margin-bottom:10px;">🛍️ Product Categories to Highlight:</strong>
                            <p style="margin:0 0 10px 0; font-size:14px; color:#555;">The content should feature one or more of the following:</p>
                            <ul style="margin-top: 5px; padding-left: 20px; display:grid; grid-template-columns: 1fr; gap:5px;">
                                <li>👗 <strong>Fashion:</strong> Eid outfits, accessories, family matching looks.</li>
                                <li>💄 <strong>Beauty:</strong> Eid makeup, perfumes, gift sets, personal care.</li>
                                <li>🏡 <strong>Home:</strong> Eid décor, hosting essentials, serving items.</li>
                                <li>🎁 <strong>Gifting:</strong> Perfumes, electronics, toys, Eid bundles.</li>
                                <li>🌿 <strong>Health & Wellness:</strong> Self-care products, supplements, post-Ramadan essentials.</li>
                            </ul>
                        </div>

                        <!-- CREATIVE DIRECTION -->
                        <h3 style="border-bottom: 3px solid #feee00; display:inline-block; padding-bottom:5px;">🎨 Creative Direction</h3>
                        <div style="margin-bottom:20px;">
                            <ul style="margin-top:5px; padding-left:20px;">
                                <li>Showcase Eid preparation moments (choosing outfits, wrapping gifts, home prep).</li>
                                <li>Modern app visuals (floating screen / screen recording).</li>
                                <li>Browsing the noon app and adding items to cart.</li>
                                <li>Receiving the order at your doorstep with ease.</li>
                            </ul>
                        </div>

                        <strong>Script Idea (Example):</strong>
                        <div style="background: #fdfdfd; padding: 15px; border-left: 3px solid #ccc; font-style: italic; margin-bottom: 25px; white-space: pre-wrap; font-size:14px;" dir="rtl">${SCRIPT_DIRECTION}</div>

                        <!-- CRITICAL POSTING RULES (RED BOX) -->
                        <div style="border: 2px dashed #d93025; background-color: #fff5f5; padding: 25px; border-radius: 12px; margin: 30px 0;">
                            <strong style="color: #d93025; font-size: 18px; text-transform: uppercase; display: block; margin-bottom: 15px;">🚨 Critical Campaign Rules</strong>
                            <ul style="margin: 0; padding-left: 20px; color: #000;">
                                <li style="margin-bottom: 12px;"><strong>Required Platforms:</strong> You must post on <u>at least 2 of the following 3 platforms:</u> <strong>Instagram Reels, TikTok, and Snapchat.</strong></li>
                                <li style="margin-bottom: 12px; background: #feee00; padding: 5px; font-weight: bold;"><strong>CRITICAL KPI:</strong> You must achieve views equivalent to 50% of your total followers. If the target is not met, the video must be boosted or reposted.</li>
                                <li style="margin-bottom: 12px;"><strong>Video Quality:</strong> High-quality video (good/natural lighting & clear visuals). NO heavy filters.</li>
                                <li style="margin-bottom: 12px;"><strong>Product Availability:</strong> Any product shown must be physically available with you, and you must clearly mention it is available on the noon app.</li>
                                <li><strong>Hashtags & Tags:</strong> #noonEid #noonApp #noonGCC | Tag: @noon</li>
                            </ul>
                        </div>

                        <!-- INVOICE SECTION (NEW REQUIREMENT) -->
                        <div style="background: #e6f7ff; padding: 20px; margin: 25px 0; border-radius: 8px; border: 1px solid #91d5ff;">
                            <strong style="color:#0050b3; display:block; margin-bottom:10px; font-size: 16px;">💳 Invoicing & Payment Steps</strong>
                            <p style="margin-top:0; font-size: 14px;">To process your payment seamlessly, please generate your official invoice using our portal:</p>
                            <a href="https://noon-invoice.vercel.app/" style="display:inline-block; margin-bottom: 10px; font-weight: bold; background-color: #0050b3; color: #fff; text-decoration: none; padding: 8px 15px; border-radius: 4px;">👉 Open noon Invoice Generator</a>
                            <ul style="margin:0; padding-left: 20px; font-size: 13px; color: #333;">
                                <li><strong>Important:</strong> noon covers a bank transfer fee of <strong>30 SAR</strong>. This amount is automatically added within the link.</li>
                                <li>Please only input your agreed base fee (<strong>${price}</strong>) alongside your full details.</li>
                                <li>Once generated, download the PDF and send it to your point of contact.</li>
                            </ul>
                        </div>

                        <!-- CTA -->
                        <div align="center" style="padding: 25px; background-color: #f9f9f9; border-radius: 12px; border: 1px solid #ddd; margin-bottom:30px;">
                            <strong style="font-size: 16px; color:#555;">📣 Mandatory Call to Action</strong><br>
                            <p style="margin:10px 0 0 0; font-style: italic;">“Download the noon app now and get ready for Eid!”<br>“Shop all your Eid essentials today at noon!”<br>“Don’t forget to use the discount code (to be shared separately)”</p>
                        </div>

                        <!-- TIMELINE -->
                        <div style="background-color: #fafafa; padding: 20px; border-radius: 8px; border: 1px solid #eee;">
                            <strong style="font-size: 16px;">📅 Submission & Timeline</strong>
                            <ul style="margin-top: 10px; padding-left: 20px;">
                                <li><strong>Video Deadline:</strong> We need the video by <strong>${deadlineStr}</strong> at the latest.</li>
                                <li><strong>Go Live Date:</strong> The post will go live on <strong>${liveStr}</strong>.</li>
                                <li><strong>Campaign Fee:</strong> ${price}</li>
                            </ul>
                        </div>

                        <!-- ACTION REQUIRED -->
                        <div style="margin-top: 30px; padding: 20px; border: 2px solid #333; border-radius: 8px; text-align: center; background: #fff;">
                            <span style="font-size: 24px;">🔔</span><br>
                            <strong style="font-size: 16px; display:block; margin-top:10px;">ACTION REQUIRED</strong>
                            <p style="margin-bottom:0;">Please reply to this email confirming receipt and your availability to proceed with the campaign.</p>
                        </div>

                        <br><br>
                        Wishing you a joyful Eid in advance 🌙✨<br><br>
                        <strong>${sender}</strong><br>
                        <span style="color: #666;">noon Marketing Team</span><br>
                        <a href="https://www.noon.com" style="color:#000; text-decoration:none;">www.noon.com</a>
                    </td>
                </tr>
            </table>`;

            // ===========================================
            // 2. ENGLISH BRIEF GENERATION (TEXT)
            // ===========================================
            const engText = `NOON EID CAMPAIGN | VIDEO CREATION BRIEF
Country: ${country}
Campaign Fee: ${price}

1. VIDEO CREATIVE DIRECTION
- Focus: Eid preparation moments (choosing outfits, wrapping gifts, home prep).
- Visuals: Include modern app visuals (floating screen / screen recording).
- Action: Show browsing the noon app, adding items to the cart, and receiving the order at your doorstep.
- Tone: Festive, friendly, simple, and clear.
- Duration: 30–45 seconds maximum.
- Audio: Use trendy or festive sounds.

2. KEY MESSAGES TO DELIVER
- noon is your one-stop shop for all Eid essentials.
- The app is now available in Qatar, Bahrain, Oman, and Kuwait.
- Delivery is fast and reliable (3-7 days).
- Shop early to avoid last-minute Eid stress.

3. PRODUCT CATEGORIES (Choose 1 or more)
- Fashion (Eid outfits, accessories, family looks)
- Beauty (Makeup, perfumes, personal care)
- Home (Eid décor, hosting essentials)
- Gifting (Perfumes, electronics, toys)
- Health & Wellness

4. MANDATORY CALL TO ACTION (CTA)
Must say: "Download the noon app now and get ready for Eid!" OR "Shop all your Eid essentials today at noon!"
(Also mention: "Don’t forget to use the discount code" - code shared separately).

5. SUBMISSION DETAILS
- Submit 2 versions: 1 Raw Video (no edits) & 1 Fully Edited Video.
- Send for approval by: ${deadlineStr}
- Go Live Date: ${liveStr}
- Any product shown must be physically with you.

--------------------------------------------------
🚨 THE 3 STRICT CAMPAIGN RULES (MANDATORY) 🚨
--------------------------------------------------
1. PLATFORMS: The video MUST be published on Instagram, TikTok, and Snapchat.
2. KPI REQUIREMENT: You MUST achieve views equivalent to 50% of your total followers. (If not met, boosting/reposting is required).
3. VIDEO QUALITY: Video must have excellent, natural lighting and clear visuals. NO heavy filters allowed.`;

            // ===========================================
            // 3. ARABIC BRIEF GENERATION (TEXT)
            // ===========================================
            const arText = `ملف تصوير فيديو حملة العيد - نون
الدولة: ${country === 'Oman' ? 'عُمان' : country === 'Kuwait' ? 'الكويت' : country === 'Qatar' ? 'قطر' : 'البحرين'}
الميزانية: ${price}

١. التوجيه الإبداعي للفيديو
- الفكرة: إظهار أجواء تحضيرات العيد (اختيار ملابس، تجهيز هدايا، تحضيرات المنزل).
- بصرياً: إضافة التطبيق بأسلوب عصري (تسجيل شاشة أو شاشة عائمة).
- الأكشن: تصفح التطبيق، إضافة المنتجات للسلة، وتصوير استلام الطلب عند باب البيت بسهولة.
- المدة: ٣٠-٤٥ ثانية كحد أقصى.
- الصوت: استخدام أصوات ترند أو موسيقى احتفالية تناسب العيد.

٢. الرسائل الأساسية (يجب توضيحها)
- نون هي وجهتك الشاملة لكل مستلزمات العيد في مكان واحد.
- التطبيق متوفر الآن في قطر، البحرين، عُمان، والكويت.
- توصيل موثوق وسريع خلال (٣ إلى ٧ أيام).
- تشجيع المتابعين على التسوق المبكر لتجنب زحمة وضغط العيد.

٣. الفئات المطلوبة (اختر فئة أو أكثر)
- الأزياء (ملابس العيد، إطلالات عائلية).
- الجمال (مكياج، عطور، عناية شخصية).
- المنزل (ديكورات العيد، أدوات الضيافة).
- الهدايا (إلكترونيات، ألعاب، عطور).
- الصحة والعناية.

٤. الدعوة لاتخاذ إجراء (CTA إجباري)
يجب قول: "حمّلوا تطبيق نون الآن واستعدوا للعيد!" أو "تسوّقوا احتياجات العيد اليوم من نون!"
(مع التنويه بضرورة استخدام كود الخصم - سيتم إرساله لاحقاً).

٥. تسليم الفيديو
- المطلوب: نسختين (نسخة خام بدون تعديل + نسخة معدلة بالكامل).

        // --- UTILITIES ---
        function switchTab(tabId) {
            document.querySelectorAll('.view-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + tabId).classList.add('active');
            event.target.classList.add('active');
            
            document.getElementById('btn-email').style.display = tabId === 'email' ? 'flex' : 'none';
            document.getElementById('btn-eng').style.display = tabId === 'eng' ? 'flex' : 'none';
            document.getElementById('btn-ar').style.display = tabId === 'ar' ? 'flex' : 'none';
        }

        function copySubject() {
            const text = document.getElementById('subjectText').innerText;
            if(text.includes("Waiting")) return;
            navigator.clipboard.writeText(text);
            alert("Subject Copied!");
        }

        function copyRichText(id, btn) {
            const node = document.getElementById(id);
            const range = document.createRange();
            range.selectNodeContents(node);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            document.execCommand('copy');
            const originalText = btn.innerText;
            btn.innerText = "COPIED! ✅";
            btn.style.background = "#00ff88";
            btn.style.borderColor = "#00ff88";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "#fff";
                btn.style.borderColor = "#feee00";
            }, 1500);
        }

        function copyText(id, btn) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            const originalText = btn.innerText;
            btn.innerText = "COPIED! ✅";
            btn.style.background = "#00ff88";
            btn.style.borderColor = "#00ff88";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "#fff";
                btn.style.borderColor = "#feee00";
            }, 1500);
        }
        
        // Ensure Subject updates on load/change
        function updateSubject() { 
             const country = document.getElementById('country').value;
             if(document.getElementById('subjectText').innerText.includes("Eid")) {
                 document.getElementById('subjectText').innerText = `Eid Campaign Collaboration | noon GCC - ${country}`;
             }
        }
    </script>
