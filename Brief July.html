<body class="min-h-screen p-4 md:p-8 font-sans selection:bg-accent selection:text-white">

    <div class="max-w-[1400px] mx-auto">
        <header class="mb-10 flex items-center justify-between fade-in" style="animation-delay: 0.1s;">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-white flex items-center gap-3">
                    إعدادات البريف (July) <span class="text-accent">📝</span>
                </h1>
                <p class="text-zinc-400 mt-1 text-sm font-medium">نظام التاغات التلقائي وتوليد الأدلة الإرشادية بتصميم حديث.</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4 fade-in" style="animation-delay: 0.2s;">

                    <div class="space-y-5 mt-2">

                            <div class="relative px-1 pb-1">
                                <select id="selectedPhase" class="w-full bg-[#121214] border border-borderSoft rounded-lg px-3 py-2 text-white text-sm appearance-none focus:outline-none focus:border-accent cursor-pointer transition-colors" dir="ltr">
                                    <option value="1">1. Grand Lifestyle Sale (Jul 10-13)</option>
                                    <option value="2">2. Mega Tech Festival (Jul 17-20)</option>
                                    <option value="3">3. End of Month Sale (Jul 24-Aug 2)</option>
                                    <option value="4">4. Salalah Khareef Festival (Oman Only)</option>
                                </select>
                                <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none">
                                    <svg class="w-3.5 h-3.5 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </div>
                            </div>
                        </div>

                        <!-- Field 2 -->
                        <div class="group relative modern-input rounded-xl border border-borderSoft p-1">
                            <label class="block text-[11px] font-bold text-zinc-500 mb-1 px-3 pt-2 text-right transition-colors group-focus-within:text-accent">منصة النشر (Platform)</label>

                        </div>

                        <!-- Field 3 -->
                        <div class="group relative modern-input rounded-xl border border-borderSoft p-1">
                            <label class="block text-[11px] font-bold text-zinc-500 mb-1 px-3 pt-2 text-right transition-colors group-focus-within:text-accent">الدولة وكود الخصم (للتاغ التلقائي)</label>
                            <div class="flex gap-2 px-1 pb-1">
                                <div class="relative w-1/2">
                                    <select id="country" class="w-full bg-[#121214] border border-borderSoft rounded-lg px-3 py-2 text-white text-sm appearance-none focus:outline-none focus:border-accent cursor-pointer transition-colors" dir="ltr">
                                        <option value="QA">Qatar (QA)</option>
                                        <option value="KW">Kuwait (KW)</option>
                                        <option value="BH">Bahrain (BH)</option>
                                        <option value="OM">Oman (OM)</option>

                en: { title: 'Mega Tech Festival', date: 'July 17 – 20', categories: 'TV & Appliances, Laptops, Gaming, Telco', action: 'Show the Mega Tech Festival banner inside the app<br>• Showcase products from featured categories<br>• Direct users to browse deals through the app banner', msg: 'Best tech deals I found on noon' },
                ar: { title: 'مهرجان التقنية الأكبر', date: '17 - 20 يوليو', categories: 'التلفزيونات والأجهزة المنزلية، اللابتوبات، الألعاب، الاتصالات', action: 'إظهار لافتة مهرجان التقنية داخل التطبيق<br>• عرض المنتجات من الفئات المحددة<br>• توجيه المستخدمين لتصفح العروض عبر لافتة التطبيق', msg: 'أفضل العروض التقنية التي وجدتها على نون' }
            },
            '3': {
                en: { title: 'End of Month Sale (BDS)', date: 'July 24 – Aug 2', categories: 'Platform-wide sale (All Categories)', action: 'Showcase products from any category available on noon<br>• Highlight end-of-month / pay-day deals and offers<br>• Direct users to the in-app sale banner', msg: 'Shopping hauls for summer activities' },

        document.addEventListener('DOMContentLoaded', () => {
            loadSavedData();
            inputIds.forEach(id => {
                document.getElementById(id).addEventListener('input', renderBrief);
            });
            renderBrief();
        });

</div>

<div class="divider"></div>

    </div>

    <ul style="margin:4px 0 0 0; padding-left:20px;">
        <li style="margin-bottom:2px;">Spoken in the video.</li>
        <li style="margin-bottom:2px;">Written on-screen as text/subtitle.</li>
        <li>In Stories with a clear Call To Action (CTA).</li>
    </ul>
    <br><em>Examples: "Use my code for extra savings" | "Don't forget my discount code on the noon app."</em>
</div>

<div class="divider"></div>
<strong style="color: #0284c7; font-size: 13px; text-transform: uppercase;">🎨 CREATIVE DIRECTION & CONTENT GUIDELINES</strong><br><br>
<ul style="margin:0; padding-left:20px; color: #3f3f46; font-size: 13px;">
    <li style="margin-bottom:4px;"><strong>Tone:</strong> Fast-paced, trend-driven, strong hook in the first 3 seconds.</li>
    <li style="margin-bottom:4px;"><strong>Focus:</strong> Lifestyle integration over hard selling.</li>

    <li style="margin-bottom:4px;"><strong>Angles:</strong> ${phaseKey === '4' ? 'Day in my life using these products (e.g., Outdoor exploration for Khareef Festival), Shopping hauls for summer and outdoor activities' : 'Must-have picks from this category, Best deals I found on noon, Unboxing / Try-On / Demo, Day in my life, Hidden gems inside the app, Shopping hauls for summer activities'}.</li>
    <li><strong style="background-color: #fef08a; padding: 2px 4px; border-radius: 4px; color: #854d0e;">Important:</strong> The word <strong>"noon"</strong> must ALWAYS be written in lowercase everywhere.</li>
</ul>

<div class="divider"></div>
<strong style="color: #0284c7; font-size: 13px; text-transform: uppercase;">🔤 TYPOGRAPHY & SUBTITLES</strong><br><br>
<div style="color: #3f3f46; font-size: 13px;">
    A bold, layered text style for bilingual reels (English and Arabic) with warm tones and strong typographic contrast is required.<br><br>
    <strong style="color: #000;">Recommended Font Pairings:</strong><br>

        function copyContent(elementId, msgId) {
            const el = document.getElementById(elementId);
            const selection = window.getSelection();
            const range = document.createRange();
            range.selectNodeContents(el);
            selection.removeAllRanges();
            selection.addRange(range);
            try {
                document.execCommand('copy');
                const successMsg = document.getElementById(msgId);
                if (successMsg) {
                    successMsg.style.opacity = '1';
                    successMsg.style.transform = 'translate(-50%, -8px)';
                    setTimeout(() => {
                        successMsg.style.opacity = '0';
                        successMsg.style.transform = 'translate(-50%, 0)';
                    }, 2000);
                }
            } catch (err) {}
            selection.removeAllRanges();
