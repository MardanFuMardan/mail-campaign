<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منشئ إيميل حملة نون - مايو</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* شريط التمرير الأنيق */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #eab308; }
        
        /* تأثيرات حركية ناعمة */
        .input-transition { transition: all 0.3s ease; }
        .input-transition:focus { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(234, 179, 8, 0.15); }
        
        .email-ltr { direction: ltr; text-align: left; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .email-rtl { direction: rtl; text-align: right; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* تدرج لوني للعناوين */
        .text-gradient {
            background: linear-gradient(90deg, #fef08a, #eab308);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen bg-[#0f172a] text-slate-100 p-4 md:p-8 font-sans selection:bg-yellow-500 selection:text-slate-900">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- القسم الأيمن: حقول الإدخال -->
        <div class="lg:col-span-4 bg-[#1e293b] p-6 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.4)] border border-slate-700/50 h-fit max-h-screen overflow-y-auto custom-scrollbar relative">
            
            <div class="sticky top-0 bg-[#1e293b]/90 backdrop-blur-sm pb-4 mb-6 z-10 border-b border-slate-700/50">
                <h1 class="text-2xl font-black text-gradient flex items-center gap-2">
                    <svg class="w-6 h-6 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    منشئ إيميل حملة مايو 🚀
                </h1>
                <p class="text-xs text-slate-400 mt-2">إصدار حصري لحملة مايو (Dark Mode UI)</p>
            </div>
            
            <div class="space-y-5">
                <div class="group">
                    <label class="block text-sm font-semibold text-slate-300 mb-1.5 group-hover:text-yellow-400 transition-colors">اسم المؤثر (Influencer Name)</label>
                    <input type="text" id="influencerName" placeholder="مثال: Ahmed" class="input-transition w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500">
                </div>

                <div class="group">
                    <label class="block text-sm font-semibold text-slate-300 mb-1.5 group-hover:text-yellow-400 transition-colors">المرحلة (Phase)</label>
                    <select id="selectedPhase" class="input-transition w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 direction-ltr text-left" dir="ltr">
                        <option value="1">1. Grand Lifestyle Reset (May 8-11)</option>
                        <option value="2">2. Mega Tech Festival (May 12-15)</option>
                        <option value="3">3. Eid Sale (May 15-Jun 2)</option>
                    </select>
                </div>

                <div class="group">
                    <label class="block text-sm font-semibold text-slate-300 mb-1.5 group-hover:text-yellow-400 transition-colors">تاريخ تسليم الفيديو (Submission Date)</label>
                    <div class="flex gap-2" dir="ltr">
                        <input type="number" id="submissionDay" placeholder="Day (10)" min="1" max="31" class="input-transition w-1/3 bg-slate-800 border border-slate-600 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 text-center">
                        <select id="submissionMonth" class="input-transition w-2/3 bg-slate-800 border border-slate-600 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500">
                            <option value="05" selected>May</option>
                            <option value="06">June</option>
                        </select>
                    </div>
                </div>

                <div class="group">
                    <label class="block text-sm font-semibold text-slate-300 mb-1.5 group-hover:text-yellow-400 transition-colors">تاريخ النشر (Go Live Date)</label>
                    <div class="flex gap-2" dir="ltr">
                        <input type="number" id="goLiveDay" placeholder="Day (12)" min="1" max="31" class="input-transition w-1/3 bg-slate-800 border border-slate-600 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 text-center">
                        <select id="goLiveMonth" class="input-transition w-2/3 bg-slate-800 border border-slate-600 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500">
                            <option value="05" selected>May</option>
                            <option value="06">June</option>
                        </select>
                    </div>
                </div>

                <div class="group">
                    <label class="block text-sm font-semibold text-slate-300 mb-1.5 group-hover:text-yellow-400 transition-colors">قيمة الحملة (Fee - بالدرهم)</label>
                    <input type="text" id="fee" placeholder="مثال: 500" class="input-transition w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 text-left" dir="ltr">
                </div>

                <div class="group">
                    <label class="block text-sm font-semibold text-slate-300 mb-1.5 group-hover:text-yellow-400 transition-colors">اسم المرسل (Sender Name)</label>
                    <input type="text" id="senderName" placeholder="مثال: Mahmoud" class="input-transition w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 text-left" dir="ltr">
                </div>
            </div>
        </div>

        <!-- القسم الأيسر: عرض الإيميل النهائي -->
        <div class="lg:col-span-8 flex flex-col gap-5">
            
            <!-- أزرار تبديل اللغة -->
            <div class="flex gap-2 bg-[#1e293b] p-1.5 rounded-xl border border-slate-700/50 w-fit shadow-lg">
                <button onclick="setLanguage('en')" id="btn-en" class="px-6 py-2 rounded-lg font-bold transition-all duration-300 bg-yellow-500 text-slate-900 shadow-[0_0_15px_rgba(234,179,8,0.4)]">English</button>
                <button onclick="setLanguage('ar')" id="btn-ar" class="px-6 py-2 rounded-lg font-bold transition-all duration-300 text-slate-400 hover:text-white hover:bg-slate-700">عربي</button>
            </div>

            <!-- مربع الـ Subject -->
            <div class="bg-[#1e293b] p-5 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.4)] border border-slate-700/50 flex justify-between items-center group transition-all duration-300 hover:border-slate-500">
                <div class="flex-1">
                    <span class="text-xs text-slate-400 font-bold uppercase tracking-wider block mb-2">عنوان الإيميل (Subject)</span>
                    <div id="subject-output" class="text-lg font-bold text-slate-800 bg-white p-3 rounded-xl border border-slate-200 email-ltr shadow-sm" dir="ltr">Subject: noon GCC May Campaign</div>
                </div>
                <button onclick="copyContent('subject-output', 'copySubMsg')" class="ml-4 mr-4 bg-slate-700 hover:bg-slate-600 text-white font-bold py-2.5 px-5 rounded-xl transition-all duration-300 flex flex-col items-center gap-1 hover:shadow-lg active:transform active:scale-95">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    <span class="text-xs">نسخ</span>
                </button>
            </div>
            <p id="copySubMsg" class="text-green-400 text-sm hidden px-2 transition-opacity">تم نسخ العنوان بنجاح! ✅</p>

            <!-- مربع الإيميل -->
            <div class="bg-[#1e293b] p-6 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.4)] border border-slate-700/50 flex flex-col h-[calc(100vh-16rem)] group transition-all duration-300 hover:border-slate-500">
                <div class="flex justify-between items-center mb-5 border-b border-slate-700 pb-5 shrink-0">
                    <h2 class="text-xl font-bold text-slate-100 flex items-center gap-2">
                        <svg class="w-5 h-5 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        محتوى الإيميل (Body)
                    </h2>
                    <button onclick="copyContent('email-body-output', 'copyBodyMsg')" class="bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-bold py-2.5 px-6 rounded-xl transition-all duration-300 flex items-center gap-2 shadow-[0_0_15px_rgba(234,179,8,0.3)] hover:shadow-[0_0_20px_rgba(234,179,8,0.5)] active:transform active:scale-95">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                        نسخ المحتوى
                    </button>
                </div>
                
                <p id="copyBodyMsg" class="text-green-400 text-sm mb-3 shrink-0 hidden transition-opacity">تم نسخ محتوى الإيميل بنجاح! جاهز للصق ✅</p>

                <!-- هنا سيتم حقن الكود المولد من الجافاسكريبت -->
                <div id="email-body-output" class="text-slate-800 bg-white p-6 md:p-8 rounded-xl border border-slate-200 overflow-y-auto custom-scrollbar text-base leading-normal flex-1 shadow-inner email-ltr" dir="ltr">
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentLanguage = 'en';

        // بيانات الأشهر باللغتين
        const monthsData = {
            '05': { en: 'May', ar: 'مايو' },
            '06': { en: 'June', ar: 'يونيو' }
        };

        // بيانات المراحل الجديدة لحملة مايو (3 مراحل فقط)
        const phasesData = {
            '1': {
                en: { title: 'Grand Lifestyle Reset', date: '📅 May 8 – May 11', categories: 'Home, Fashion, W&B, Footwear, Beauty, Fitness' },
                ar: { title: 'انطلاقة أسلوب الحياة', date: '📅 8 - 11 مايو', categories: 'المنزل، الأزياء، الساعات والشنط، الأحذية، الجمال، اللياقة' }
            },
            '2': {
                en: { title: 'Mega Tech Festival', date: '📅 May 12 – May 15', categories: 'TVs, Appliances, Laptops, Gaming, Telco' },
                ar: { title: 'مهرجان التقنية الأكبر', date: '📅 12 - 15 مايو', categories: 'التلفزيونات، الأجهزة المنزلية، اللابتوب، الألعاب، الإلكترونيات' }
            },
            '3': {
                en: { title: 'Eid Sale', date: '📅 May 15 – June 2', categories: 'Beauty, Fashion Basics, Home Essentials, Footwear, Fitness, Gifting' },
                ar: { title: 'عروض العيد', date: '📅 15 مايو - 2 يونيو', categories: 'الجمال، أساسيات الأزياء، مستلزمات المنزل، الأحذية، اللياقة، الهدايا' }
            }
        };

        const inputIds = ['influencerName', 'selectedPhase', 'submissionDay', 'submissionMonth', 'goLiveDay', 'goLiveMonth', 'fee', 'senderName'];

        document.addEventListener('DOMContentLoaded', () => {
            loadSavedData();
            inputIds.forEach(id => {
                document.getElementById(id).addEventListener('input', renderEmail);
            });
            renderEmail();
        });

        function setLanguage(lang) {
            currentLanguage = lang;
            
            const btnEn = document.getElementById('btn-en');
            const btnAr = document.getElementById('btn-ar');
            const subjectOutput = document.getElementById('subject-output');
            const bodyOutput = document.getElementById('email-body-output');
            
            // تحديث الأزرار مع الـ Animations
            if(lang === 'en') {
                btnEn.className = "px-6 py-2 rounded-lg font-bold transition-all duration-300 bg-yellow-500 text-slate-900 shadow-[0_0_15px_rgba(234,179,8,0.4)]";
                btnAr.className = "px-6 py-2 rounded-lg font-bold transition-all duration-300 text-slate-400 hover:text-white hover:bg-slate-700";
                
                subjectOutput.className = "text-lg font-bold text-slate-800 bg-white p-3 rounded-xl border border-slate-200 email-ltr shadow-sm";
                subjectOutput.setAttribute('dir', 'ltr');
                
                bodyOutput.className = "text-slate-800 bg-white p-6 md:p-8 rounded-xl border border-slate-200 overflow-y-auto custom-scrollbar text-base leading-normal flex-1 shadow-inner email-ltr";
                bodyOutput.setAttribute('dir', 'ltr');
            } else {
                btnAr.className = "px-6 py-2 rounded-lg font-bold transition-all duration-300 bg-yellow-500 text-slate-900 shadow-[0_0_15px_rgba(234,179,8,0.4)]";
                btnEn.className = "px-6 py-2 rounded-lg font-bold transition-all duration-300 text-slate-400 hover:text-white hover:bg-slate-700";
                
                subjectOutput.className = "text-lg font-bold text-slate-800 bg-white p-3 rounded-xl border border-slate-200 email-rtl shadow-sm";
                subjectOutput.setAttribute('dir', 'rtl');
                
                bodyOutput.className = "text-slate-800 bg-white p-6 md:p-8 rounded-xl border border-slate-200 overflow-y-auto custom-scrollbar text-base leading-normal flex-1 shadow-inner email-rtl"; 
                bodyOutput.setAttribute('dir', 'rtl');
            }
            
            renderEmail();
        }

        function renderEmail() {
            const data = {};
            inputIds.forEach(id => { data[id] = document.getElementById(id).value; });
            localStorage.setItem('noonCampaignEmailMay', JSON.stringify(data));

            const l = currentLanguage;
            const infName = data.influencerName || (l === 'en' ? '[Name]' : '[الاسم]');
            const sender = data.senderName || (l === 'en' ? '[Sender Name]' : '[اسم المرسل]');
            
            const subDay = data.submissionDay ? data.submissionDay.trim() : '';
            const subMonthKey = data.submissionMonth || '05';
            const subMonthName = monthsData[subMonthKey][l];
            const subDate = subDay ? `${subDay} ${subMonthName}` : (l === 'en' ? '[Submission Date]' : '[تاريخ التسليم]');

            const liveDay = data.goLiveDay ? data.goLiveDay.trim() : '';
            const liveMonthKey = data.goLiveMonth || '05';
            const liveMonthName = monthsData[liveMonthKey][l];
            const liveDate = liveDay ? `${liveDay} ${liveMonthName}` : (l === 'en' ? '[Go Live Date]' : '[تاريخ النشر]');
            
            const rawFee = data.fee ? data.fee.replace(/AED|درهم/ig, '').trim() : '';
            const feeAmt = rawFee ? rawFee + ' AED' : (l === 'en' ? '[Fee] AED' : '[المبلغ] AED');

            const phaseKey = data.selectedPhase || '1';
            const p = phasesData[phaseKey][l];

            const subjectEl = document.getElementById('subject-output');
            subjectEl.innerText = l === 'en' ? "Subject: noon GCC May Campaign" : "الموضوع: حملة نون لدول الخليج - شهر مايو";

            let htmlContent = "";

            if (l === 'en') {
                htmlContent = `Hi <strong>${infName}</strong>,<br><br>
We hope you’re doing well ✨<br><br>
We’re excited to collaborate with you on the noon GCC May Campaign across Qatar, Bahrain, Oman, and Kuwait.<br><br>
This campaign is designed to drive app downloads, encourage category exploration, and boost purchases through authentic influencer-led content that showcases noon as the go-to destination for everyday shopping, lifestyle essentials, and exciting deals.<br><br>

<strong>Campaign Overview</strong><br>
Throughout May, noon will spotlight key shopping moments across different phases, each supported by dedicated in-app banners that users can explore directly through the app.<br>
Influencers will create engaging content aligned with each campaign phase, encouraging audiences to discover featured categories and shop directly via noon.<br><br>

<strong>Campaign Objectives</strong><br>
• Drive noon app downloads<br>
• Encourage users to explore categories via in-app banners<br>
• Increase sales across featured categories<br>
• Promote the discount code PROMO15<br><br>

<strong>Assigned Campaign Phase</strong><br>
<div style="background-color: #f8fafc; padding: 16px; margin: 12px 0; border-left: 4px solid #eab308; border-radius: 8px;">
<strong>${p.title}</strong><br>
${p.date}<br>
<strong>Categories:</strong> ${p.categories}
</div><br>

<strong>Discount Code</strong><br>
Use code: <strong>PROMO15</strong><br><br>
• Qatar: 15% off orders above 100 QAR (max 100 QAR)<br>
• Kuwait: 15% off orders above 10 KWD (max 10 KWD)<br>
• Bahrain: 15% off orders above 10 BHD (max 10 BHD)<br>
• Oman: 15% off orders above 10 OMR (max 10 OMR)<br><br>
<span style="font-style: italic;">Please mention the code clearly (spoken + written).</span><br><br>

<strong>Key Campaign Messages</strong><br>
• Shop directly through the noon app<br>
• Explore featured categories through the in-app banner<br>
• Exclusive app-only deals<br>
• Download the app to access offers<br>
• Don’t forget to use code PROMO15<br><br>

<strong>Content Guidelines</strong><br>
Content should:<br>
• Feature products from the assigned category<br>
• Integrate products naturally into your lifestyle<br>
• Highlight authentic product usage (not overly sales-driven)<br>
• Showcase the noon app and campaign banner clearly<br><br>

<strong>Creative Direction</strong><br>
• My top picks from noon<br>
• Best deals I found on noon<br>
• Unboxing / Demo / Try-on<br>
• Day in my life featuring noon finds<br>
• Hidden gems on the app<br>
• Before & after transformations<br><br>

<strong>Mandatory Requirements</strong><br>
• Show the noon app clearly<br>
• Include screen recording / banner visibility<br>
• Clear CTA:<br>
&nbsp;&nbsp;- Download the app<br>
&nbsp;&nbsp;- Click on the campaign banner<br>
&nbsp;&nbsp;- Explore the category<br>
&nbsp;&nbsp;- Use code PROMO15<br><br>

<strong>Video Requirements</strong><br>
• Duration: 30–45 seconds<br>
• Platforms: Instagram Reels / TikTok<br>
• High-quality visuals<br>
• Good lighting & clean framing<br>
• No heavy filters<br>
• Trendy / festive audio is preferred<br><br>

<strong>Deliverables</strong><br>
1 Reel / TikTok video aligned with the assigned phase and category<br><br>

<strong>Submission & Timeline</strong><br>
We need the video by <strong>${subDate}</strong> at the latest, as the post will go live on <strong>${liveDate}</strong>.<br>
Final approval is required before posting.<br><br>

<strong>Payment Details</strong><br>
Campaign fee: <strong>${feeAmt}</strong><br><br>
The payment will be transferred to your bank account within 30 days after the campaign ends starting from 30 May.<br><br>
Please complete the bank details form, submit the invoice, and reply to this email with the completed invoice.<br><br>
Form Link : <a href="https://docs.google.com/forms/d/e/1FAIpQLScoTjUr51CW-jR53OHdLvec0THAq0IUI7KnSdvo0axJjni44w/viewform?usp=dialog" style="color: #2563eb; text-decoration: underline;">https://docs.google.com/forms/d/e/1FAIpQLScoTjUr51CW-jR53OHdLvec0THAq0IUI7KnSdvo0axJjni44w/viewform?usp=dialog</a><br>
Invoice Link: <a href="https://noon-invoice.vercel.app/" style="color: #2563eb; text-decoration: underline;">https://noon-invoice.vercel.app/</a><br><br>

<strong>Notes</strong><br>
• KPI: Achieve views equivalent to 50% of your total followers<br>
• If the target is not met, the video may need boosting or reposting<br>
• The content must remain live for at least one year<br>
• noon reserves the right to use the content across its marketing platforms<br><br>

<strong>Next Steps</strong><br>
Please confirm your availability and interest in participating in this campaign.<br><br>
If you have any questions, feel free to reach out, we’d love to see your creative take on this campaign.<br><br>

Best regards,<br>
<strong>${sender}</strong><br>
noon Marketing Team`;
            } else {
                htmlContent = `مرحباً <strong>${infName}</strong>،<br><br>
نأمل أن تكون بخير ✨<br><br>
يسعدنا التعاون معك في حملة نون لشهر مايو في دول الخليج (قطر، البحرين، عُمان، والكويت).<br><br>
تم تصميم هذه الحملة لزيادة تنزيلات التطبيق، وتشجيع استكشاف الفئات، وزيادة المبيعات من خلال محتوى أصيل يقدمه المؤثرون لإبراز "نون" كوجهة مفضلة للتسوق اليومي، والاحتياجات الأساسية لأسلوب الحياة، وأفضل العروض.<br><br>

<strong>نظرة عامة على الحملة</strong><br>
طوال شهر مايو، ستسلط نون الضوء على لحظات التسوق الرئيسية عبر مراحل مختلفة، كل منها مدعوم بلافتات (Banners) مخصصة يمكن للمستخدمين استكشافها مباشرة داخل التطبيق.<br>
سيقوم المؤثرون بإنشاء محتوى تفاعلي يتماشى مع كل مرحلة، لتشجيع الجمهور على اكتشاف الفئات والتسوق مباشرة عبر نون.<br><br>

<strong>أهداف الحملة</strong><br>
• زيادة تنزيلات تطبيق نون<br>
• تشجيع المستخدمين على استكشاف الفئات عبر اللافتات<br>
• زيادة المبيعات في الفئات المميزة<br>
• الترويج لكود الخصم PROMO15<br><br>

<strong>مرحلة الحملة المخصصة لك</strong><br>
<div style="background-color: #f8fafc; padding: 16px; margin: 12px 0; border-right: 4px solid #eab308; border-radius: 8px;">
<strong>${p.title}</strong><br>
${p.date}<br>
<strong>الفئات:</strong> ${p.categories}
</div><br>

<strong>كود الخصم</strong><br>
استخدم الكود: <strong>PROMO15</strong><br><br>
• قطر: خصم 15% للطلبات فوق 100 ريال قطري (بحد أقصى 100 ريال)<br>

        function loadSavedData() {
            const saved = localStorage.getItem('noonCampaignEmailMay');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    inputIds.forEach(id => {
                        if (parsed[id]) document.getElementById(id).value = parsed[id];
                    });
                } catch (e) { console.error(e); }
            }
        }

        function copyContent(elementId, msgId) {
            const el = document.getElementById(elementId);
            const selection = window.getSelection();
            const range = document.createRange();
            range.selectNodeContents(el);
            selection.removeAllRanges();
            selection.addRange(range);
            
            try {
                document.execCommand('copy');
                const successMsg = document.getElementById(msgId);
                if (successMsg) {
                    successMsg.classList.remove('hidden');
                    successMsg.classList.add('animate-pulse');
                    setTimeout(() => {
                        successMsg.classList.add('hidden');
                        successMsg.classList.remove('animate-pulse');
                    }, 3000);
                }
            } catch (err) {
                alert('حدث خطأ أثناء النسخ');
            }
            
            selection.removeAllRanges();
        }
    </script>
