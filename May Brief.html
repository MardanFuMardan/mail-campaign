        function loadSavedData() {
            const saved = localStorage.getItem('noonBriefDataMay');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    inputIds.forEach(id => {
                        if (parsed[id]) document.getElementById(id).value = parsed[id];
                    });
                } catch (e) { console.error(e); }
            }
        }

        function copyContent(elementId) {
            const el = document.getElementById(elementId);
            
            const selection = window.getSelection();
            const range = document.createRange();
            range.selectNodeContents(el);
            selection.removeAllRanges();
            selection.addRange(range);
            
            try {
                document.execCommand('copy');
                const successMsg = document.getElementById('copySuccessMsg');
                if (successMsg) {
                    successMsg.classList.remove('hidden');
                    successMsg.classList.add('animate-pulse');
                    setTimeout(() => {
                        successMsg.classList.add('hidden');
                        successMsg.classList.remove('animate-pulse');
                    }, 3000);
                }
            } catch (err) {
                alert('حدث خطأ أثناء النسخ');
            }
            
            selection.removeAllRanges();
        }
    </script>
