<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منشئ إيميل حملة نون</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #374151; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4B5563; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #6B7280; }
        
        /* تنسيقات للتحكم في اتجاه النص بناءً على اللغة */
        .email-ltr { direction: ltr; text-align: left; }
        .email-rtl { direction: rtl; text-align: right; }
    </style>
</head>
<body class="min-h-screen bg-gray-900 text-gray-100 p-4 md:p-8 font-sans">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- القسم الأيمن: حقول الإدخال -->
        <div class="lg:col-span-4 bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700 h-fit max-h-screen overflow-y-auto custom-scrollbar">
            <h1 class="text-2xl font-bold text-yellow-400 mb-6 sticky top-0 bg-gray-800 pb-2 z-10 border-b border-gray-700">إعدادات الإيميل ⚙️</h1>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">اسم المؤثر (Influencer Name)</label>
                    <input type="text" id="influencerName" placeholder="مثال: Ahmed" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-yellow-400">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">المرحلة (Phase)</label>
                    <select id="selectedPhase" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-yellow-400 direction-ltr text-left" dir="ltr">
                        <option value="1">Grand Lifestyle Sale (12-13 Apr)</option>
                        <option value="2">Gap – Light Phase (14-16 Apr)</option>
                        <option value="3">Mega Tech Festival (17-20 Apr)</option>
                        <option value="4">Gap – Light Phase (21-23 Apr)</option>
                        <option value="5">End of Month Sale (24 Apr - 2 May)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">تاريخ تسليم الفيديو (Submission Date)</label>
                    <div class="flex gap-2" dir="ltr">
                        <input type="number" id="submissionDay" placeholder="Day (e.g. 10)" min="1" max="31" class="w-1/3 bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-yellow-400 text-center">
                        <select id="submissionMonth" class="w-2/3 bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-yellow-400">
                            <option value="03">March</option>
                            <option value="04" selected>April</option>
                            <option value="05">May</option>
                            <option value="06">June</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">تاريخ النشر (Go Live Date)</label>
                    <div class="flex gap-2" dir="ltr">
                        <input type="number" id="goLiveDay" placeholder="Day (e.g. 12)" min="1" max="31" class="w-1/3 bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-yellow-400 text-center">
                        <select id="goLiveMonth" class="w-2/3 bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-yellow-400">
                            <option value="03">March</option>
                            <option value="04" selected>April</option>
                            <option value="05">May</option>
                            <option value="06">June</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">قيمة الحملة (Fee - بالدرهم)</label>
                    <input type="text" id="fee" placeholder="مثال: 500" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-yellow-400 text-left" dir="ltr">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">اسم المرسل (Sender Name)</label>
                    <input type="text" id="senderName" placeholder="مثال: Mahmoud" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-yellow-400 text-left" dir="ltr">
                </div>
            </div>
        </div>

        <!-- القسم الأيسر: عرض الإيميل النهائي -->
        <div class="lg:col-span-8 flex flex-col gap-4">
            
            <!-- أزرار تبديل اللغة -->
            <div class="flex gap-2 bg-gray-800 p-2 rounded-lg border border-gray-700 w-fit">
                <button onclick="setLanguage('en')" id="btn-en" class="px-6 py-2 rounded-md font-bold transition-colors bg-yellow-500 text-gray-900">English</button>
                <button onclick="setLanguage('ar')" id="btn-ar" class="px-6 py-2 rounded-md font-bold transition-colors text-gray-300 hover:bg-gray-700">عربي</button>
            </div>

            <!-- مربع الـ Subject -->
            <div class="bg-gray-800 p-4 rounded-xl shadow-lg border border-gray-700 flex justify-between items-center">
                <div class="flex-1">
                    <span class="text-xs text-gray-400 block mb-1">عنوان الإيميل (Subject)</span>
                    <div id="subject-output" class="text-lg font-bold text-gray-900 bg-white p-3 rounded-lg border border-gray-300 email-ltr" dir="ltr">Subject : noon GCC April Campaign</div>
                </div>
                <button onclick="copyContent('subject-output')" class="bg-gray-700 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded transition-colors text-sm">
                    نسخ العنوان
                </button>
            </div>

            <!-- مربع الإيميل -->
            <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700 flex flex-col h-[calc(100vh-12rem)]">
                <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-4 shrink-0">
                    <h2 class="text-xl font-bold text-white">محتوى الإيميل (Body)</h2>
                    <button onclick="copyContent('email-body-output')" class="bg-yellow-500 hover:bg-yellow-600 text-gray-900 font-bold py-2 px-4 rounded transition-colors flex items-center">
                        نسخ المحتوى
                    </button>
                </div>
                
                <p id="copySuccessMsg" class="text-green-400 text-sm mb-4 shrink-0 hidden">تم النسخ بنجاح! ✅</p>

                <!-- هنا سيتم حقن الكود المولد من الجافاسكريبت -->
                <div id="email-body-output" class="text-gray-900 bg-white p-6 rounded-lg border border-gray-300 overflow-y-auto custom-scrollbar text-base leading-normal flex-1 email-ltr" dir="ltr">
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentLanguage = 'en';

        // بيانات الأشهر باللغتين
        const monthsData = {
            '03': { en: 'March', ar: 'مارس' },
            '04': { en: 'April', ar: 'أبريل' },
            '05': { en: 'May', ar: 'مايو' },
            '06': { en: 'June', ar: 'يونيو' }
        };

        // بيانات المراحل باللغتين (تم إزالة الأرقام منها)
        const phasesData = {
            '1': {
                en: { title: 'Grand Lifestyle Sale', date: '📅 12 – 13 April', categories: 'Home, Fashion, W&E, Footwear, Beauty, Fitness', notes: 'Mention code PROMO10 on stories & caption.' },
                ar: { title: 'التخفيضات الكبرى لأسلوب الحياة', date: '📅 12 – 13 أبريل', categories: 'المنزل، الأزياء، الساعات والإكسسوارات، الأحذية، الجمال، اللياقة', notes: 'اذكر كود PROMO10 في الاستوري والوصف.' }
            },
            '2': {
                en: { title: 'Gap – Light Phase', date: '📅 14 – 16 April', categories: 'Beauty, Fashion basics, Home essentials, Footwear, Fitness, Coupons/Bundles', notes: 'Mention code PROMO10. Tease Mega Tech Festival (Apr 17–20) — 10% mention.' },
                ar: { title: 'مرحلة خفيفة (تخليل)', date: '📅 14 – 16 أبريل', categories: 'الجمال، أساسيات الأزياء، مستلزمات المنزل، الأحذية، اللياقة، الكوبونات/الباقات', notes: 'اذكر كود PROMO10. مهّد لمهرجان التقنية الأكبر (17-20 أبريل) بنسبة 10%.' }
            },
            '3': {
                en: { title: 'Mega Tech Festival', date: '📅 17 – 20 April', categories: 'TVs, Appliances, Laptops, Gaming, Telco', notes: 'Mention code PROMO10 on stories & caption.' },
                ar: { title: 'مهرجان التقنية الأكبر', date: '📅 17 – 20 أبريل', categories: 'التلفزيونات، الأجهزة المنزلية، اللابتوب، الألعاب، الإلكترونيات', notes: 'اذكر كود PROMO10 في الاستوري والوصف.' }
            },
            '4': {
                en: { title: 'Gap – Light Phase', date: '📅 21 – 23 April', categories: 'Tech accessories, Gaming accessories, Wearables, Fashion accessories, Baby/Kids, Budget tech', notes: 'Mention code PROMO10. Tease End of Month Sale — 10% mention.' },
                ar: { title: 'مرحلة خفيفة (تخليل)', date: '📅 21 – 23 أبريل', categories: 'إكسسوارات التقنية، إكسسوارات الألعاب، الأجهزة القابلة للارتداء، إكسسوارات الأزياء، الأطفال والرضع، التقنية الاقتصادية', notes: 'اذكر كود PROMO10. مهّد لتخفيضات نهاية الشهر بنسبة 10%.' }
            },
            '5': {
                en: { title: 'End of Month Sale', date: '📅 24 April – 2 May', categories: 'Platform-wide — All categories', notes: 'Mention code PROMO10. Tease 10% about May campaigns.' },
                ar: { title: 'تخفيضات نهاية الشهر', date: '📅 24 أبريل – 2 مايو', categories: 'جميع الفئات على منصة نون', notes: 'اذكر كود PROMO10. مهّد لحملات شهر مايو بنسبة 10%.' }
            }
        };

        const inputIds = ['influencerName', 'selectedPhase', 'submissionDay', 'submissionMonth', 'goLiveDay', 'goLiveMonth', 'fee', 'senderName'];

        document.addEventListener('DOMContentLoaded', () => {
            loadSavedData();
            inputIds.forEach(id => {
                document.getElementById(id).addEventListener('input', renderEmail);
            });
            renderEmail();
        });

        function setLanguage(lang) {
            currentLanguage = lang;
            
            // تغيير ستايل الأزرار والاتجاهات
            if(lang === 'en') {
                document.getElementById('btn-en').className = "px-6 py-2 rounded-md font-bold transition-colors bg-yellow-500 text-gray-900";
                document.getElementById('btn-ar').className = "px-6 py-2 rounded-md font-bold transition-colors text-gray-300 hover:bg-gray-700";
                
                const subjectOutput = document.getElementById('subject-output');
                subjectOutput.className = "text-lg font-bold text-gray-900 bg-white p-3 rounded-lg border border-gray-300 email-ltr";
                subjectOutput.setAttribute('dir', 'ltr');
                
                const bodyOutput = document.getElementById('email-body-output');
                bodyOutput.className = "text-gray-900 bg-white p-6 rounded-lg border border-gray-300 overflow-y-auto custom-scrollbar text-base leading-normal flex-1 email-ltr";
                bodyOutput.setAttribute('dir', 'ltr');
            } else {
                document.getElementById('btn-ar').className = "px-6 py-2 rounded-md font-bold transition-colors bg-yellow-500 text-gray-900";
                document.getElementById('btn-en').className = "px-6 py-2 rounded-md font-bold transition-colors text-gray-300 hover:bg-gray-700";
                
                const subjectOutput = document.getElementById('subject-output');
                subjectOutput.className = "text-lg font-bold text-gray-900 bg-white p-3 rounded-lg border border-gray-300 email-rtl";
                subjectOutput.setAttribute('dir', 'rtl');
                
                const bodyOutput = document.getElementById('email-body-output');
                bodyOutput.className = "text-gray-900 bg-white p-6 rounded-lg border border-gray-300 overflow-y-auto custom-scrollbar text-base leading-normal flex-1 email-rtl"; 
                bodyOutput.setAttribute('dir', 'rtl');
            }
            
            renderEmail();
        }

        function renderEmail() {
            // جلب البيانات من الحقول
            const data = {};
            inputIds.forEach(id => { data[id] = document.getElementById(id).value; });
            localStorage.setItem('noonCampaignEmailSimple', JSON.stringify(data));

            // إعداد المتغيرات حسب اللغة
            const l = currentLanguage;
            const infName = data.influencerName || (l === 'en' ? '[Name]' : '[الاسم]');
            const sender = data.senderName || (l === 'en' ? '[Sender Name]' : '[اسم المرسل]');
            
            // معالجة التواريخ لدمج اليوم مع الشهر المترجم
            const subDay = data.submissionDay ? data.submissionDay.trim() : '';
            const subMonthKey = data.submissionMonth || '04';
            const subMonthName = monthsData[subMonthKey][l];
            const subDate = subDay ? `${subDay} ${subMonthName}` : (l === 'en' ? '[Submission Date]' : '[تاريخ التسليم]');

            const liveDay = data.goLiveDay ? data.goLiveDay.trim() : '';
            const liveMonthKey = data.goLiveMonth || '04';
            const liveMonthName = monthsData[liveMonthKey][l];
            const liveDate = liveDay ? `${liveDay} ${liveMonthName}` : (l === 'en' ? '[Go Live Date]' : '[تاريخ النشر]');
            
            // معالجة قيمة الحملة لتكون دائماً مع AED ولا تتكرر إذا أدخلها المستخدم
            const rawFee = data.fee ? data.fee.replace(/AED|درهم/ig, '').trim() : '';
            const feeAmt = rawFee ? rawFee + ' AED' : (l === 'en' ? '[Fee] AED' : '[المبلغ] AED');

            const phaseKey = data.selectedPhase || '1';
            const p = phasesData[phaseKey][l];

            // تحديث عنوان الإيميل
            const subjectEl = document.getElementById('subject-output');
            subjectEl.innerText = "Noon GCC April Campaign 2026";

            // بناء محتوى الإيميل
            let htmlContent = "";

            if (l === 'en') {
                htmlContent = `Hi <strong>${infName}</strong>,<br><br>
We hope you’re doing well ✨<br>
We’re excited to reach out regarding the noon April Campaign across the GCC (Qatar, Bahrain, Oman, and Kuwait).<br>
This campaign aims to drive app downloads, increase category exploration, and boost purchases through engaging influencer-led content that highlights noon as a go-to destination for everyday needs.<br><br>

<strong>Campaign Overview</strong><br>
Throughout April, noon will spotlight different product categories across multiple phases, each supported by dedicated in-app banners that users can explore directly.<br>
Influencers will create content aligned with each phase, encouraging audiences to discover featured categories and shop directly through the app.<br><br>

<strong>Campaign Objectives</strong><br>
• Drive noon app downloads<br>
• Encourage users to explore categories via in-app banners<br>
• Increase sales across featured categories<br>
• Promote the discount code PROMO10<br><br>

<strong>Assigned Campaign Phase</strong><br>
<div style="background-color: #f9fafb; padding: 16px; margin: 8px 0; border-left: 4px solid #eab308; border-radius: 8px;">
<strong>${p.title}</strong><br>
${p.date}<br>
<strong>Categories:</strong> ${p.categories}<br>
<strong>Notes:</strong> ${p.notes}
</div><br>

<strong>Discount Code</strong><br>
Use code: <strong>PROMO10</strong><br>
Qatar: 10% off orders above 100 QAR (max 100 QAR)<br>
Kuwait: 10% off orders above 10 KWD (max 10 KWD)<br>
Bahrain: 10% off orders above 10 BHD (max 10 BHD)<br>
Oman: 10% off orders above 10 OMR (max 10 OMR)<br>
<span style="font-style: italic;">Please mention the code clearly (spoken + written).</span><br><br>

<strong>Key Campaign Messages</strong><br>
• Shop directly through the noon app<br>
• Explore categories via the in-app banner<br>
• Exclusive deals available only on the app<br>
• Download the app to access all offers<br>
• Don’t forget to use the discount code<br><br>

<strong>Content Guidelines</strong><br>
Content should:<br>
• Feature products from the assigned category<br>
• Integrate products naturally into your lifestyle<br>
• Highlight real usage (not overly sales-driven)<br>
• Showcase the noon app and category banner<br><br>

<strong>Creative Direction</strong><br>
• “My top picks from this category”<br>
• “Best deals I found on noon”<br>
• Unboxing / demo / product testing<br>
• Daily routine using products from the category<br>
• Hidden gems on the app<br>
• Before & after transformations<br><br>

<strong>Mandatory Requirements</strong><br>
• Show the noon app clearly<br>
• Include screen recording or banner visibility<br>
• Clear Call To Action: Download the app / Click on the banner / Explore the category<br><br>

<strong>Video Requirements</strong><br>
• Duration: 30–45 seconds<br>
• Platforms: Instagram Reels & TikTok<br>
• High-quality video (good lighting & clear visuals)<br>
• No heavy filters<br>
• Trendy or festive sounds<br><br>

<strong>Deliverables</strong><br>
Reels / TikTok video aligned with assigned phase and category<br><br>

<strong>Submission & Timeline</strong><br>
We need the video by <strong>${subDate}</strong> at the latest as the post will go live on <strong>${liveDate}</strong>.<br>
Final approval is required before posting<br><br>

<strong>Payment Details</strong><br>
Campaign fee: <strong>${feeAmt}</strong><br>
The payment will be transferred to your bank account within 30 days after the campaign ends, starting from 2 May.<br>
Please fill in the following links with your bank account details, complete the required invoice, and reply to the email with it:<br>
Form Link : <a href="https://docs.google.com/forms/d/e/1FAIpQLScoTjUr51CW-jR53OHdLvec0THAq0IUI7KnSdvo0axJjni44w/viewform?usp=dialog" style="color: #2563eb; text-decoration: underline;">https://docs.google.com/forms/d/e/1FAIpQLScoTjUr51CW-jR53OHdLvec0THAq0IUI7KnSdvo0axJjni44w/viewform?usp=dialog</a><br>
Invoice Link: <a href="https://noon-invoice.vercel.app/" style="color: #2563eb; text-decoration: underline;">https://noon-invoice.vercel.app/</a><br><br>

<strong>Notes</strong><br>
• KPI: Achieve views equivalent to 50% of your total followers<br>
• If the target is not met, the video should be boosted or reposted<br>
• The video must remain live for at least one year<br>
• noon reserves the right to use the video across its platforms<br><br>

<strong>Next Steps</strong><br>
Please confirm your availability and interest in participating in this campaign.<br>
If you have any questions, feel free to reach out. We'd love to see your creative take on this campaign!<br><br>

Best regards,<br>
<strong>${sender}</strong><br>
noon Marketing Team`;
            } else {
                htmlContent = `مرحباً <strong>${infName}</strong>،<br><br>
نأمل أن تكون بخير ✨<br>
يسعدنا التواصل معك بخصوص حملة نون لشهر أبريل في دول الخليج (قطر، البحرين، عُمان، والكويت).<br>
تهدف هذه الحملة إلى زيادة تنزيلات التطبيق، وتشجيع استكشاف الفئات المختلفة، وزيادة المبيعات من خلال محتوى جذاب يقدمه المؤثرون لإبراز "نون" كوجهة أساسية للاحتياجات اليومية.<br><br>

<strong>نظرة عامة على الحملة</strong><br>
طوال شهر أبريل، ستسلط نون الضوء على فئات منتجات مختلفة عبر عدة مراحل، كل منها مدعوم بلافتات (Banners) مخصصة داخل التطبيق.<br>
سيقوم المؤثرون بإنشاء محتوى يتماشى مع كل مرحلة، لتشجيع الجمهور على اكتشاف الفئات والتسوق مباشرة عبر التطبيق.<br><br>

<strong>أهداف الحملة</strong><br>
• زيادة تنزيلات تطبيق نون<br>
• تشجيع المستخدمين على استكشاف الفئات عبر اللافتات<br>
• زيادة المبيعات في الفئات المميزة<br>
• الترويج لكود الخصم PROMO10<br><br>

<strong>مرحلة الحملة المخصصة لك</strong><br>
<div style="background-color: #f9fafb; padding: 16px; margin: 8px 0; border-right: 4px solid #eab308; border-radius: 8px;">
<strong>${p.title}</strong><br>
${p.date}<br>
<strong>الفئات:</strong> ${p.categories}<br>
<strong>ملاحظات:</strong> ${p.notes}
</div><br>

<strong>كود الخصم</strong><br>
استخدم الكود: <strong>PROMO10</strong><br>
قطر: خصم 10% للطلبات فوق 100 ريال قطري (بحد أقصى 100 ريال)<br>
الكويت: خصم 10% للطلبات فوق 10 دينار كويتي (بحد أقصى 10 دينار)<br>
البحرين: خصم 10% للطلبات فوق 10 دينار بحريني (بحد أقصى 10 دينار)<br>
عُمان: خصم 10% للطلبات فوق 10 ريال عماني (بحد أقصى 10 ريال)<br>
<span style="font-style: italic;">يُرجى ذكر الكود بوضوح (نطقاً وكتابةً).</span><br><br>

<strong>الرسائل الأساسية للحملة</strong><br>
• تسوق مباشرة عبر تطبيق نون<br>
• استكشف الفئات عبر اللافتة داخل التطبيق<br>
• صفقات حصرية متاحة فقط على التطبيق<br>
• حمّل التطبيق للوصول إلى جميع العروض<br>
• لا تنسَ استخدام كود الخصم<br><br>

<strong>إرشادات المحتوى</strong><br>
يجب أن يتضمن المحتوى:<br>
• عرض منتجات من الفئة المخصصة لك<br>
• دمج المنتجات بشكل طبيعي في روتين حياتك<br>
• تسليط الضوء على الاستخدام الفعلي (تجنب الأسلوب البيعي المباشر)<br>
• عرض تطبيق نون ولافتة الفئة بوضوح<br><br>

<strong>التوجيه الإبداعي</strong><br>
• "أفضل اختياراتي من هذه الفئة"<br>
• "أفضل الصفقات التي وجدتها على نون"<br>
• فتح الصندوق / تجربة / اختبار المنتج<br>
• الروتين اليومي باستخدام منتجات من الفئة<br>
• المنتجات المميزة والمخفية على التطبيق<br>
• تحولات قبل وبعد (Before & after)<br><br>

<strong>المتطلبات الإلزامية</strong><br>
• إظهار تطبيق نون بوضوح<br>
• تضمين تسجيل للشاشة أو إظهار اللافتة (banner)<br>

        function loadSavedData() {
            const saved = localStorage.getItem('noonCampaignEmailSimple');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    inputIds.forEach(id => {
                        if (parsed[id]) document.getElementById(id).value = parsed[id];
                    });
                } catch (e) { console.error(e); }
            }
        }

        function copyContent(elementId) {
            const el = document.getElementById(elementId);
            
            // استخدام Selection API لنسخ المحتوى كنص منسق (Rich Text)
            const selection = window.getSelection();
            const range = document.createRange();
            range.selectNodeContents(el);
            selection.removeAllRanges();
            selection.addRange(range);
            
            try {
                document.execCommand('copy');
                const successMsg = document.getElementById('copySuccessMsg');
                if (successMsg && elementId === 'email-body-output') {
                    successMsg.classList.remove('hidden');
                    setTimeout(() => successMsg.classList.add('hidden'), 3000);
                }
            } catch (err) {
                alert('حدث خطأ أثناء النسخ');
            }
            
            // إزالة التحديد بعد النسخ
            selection.removeAllRanges();
        }
    </script>
