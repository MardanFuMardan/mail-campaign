        function loadSavedData() {
            const saved = localStorage.getItem('noonBriefJuneUI_Dark');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    inputIds.forEach(id => { if (parsed[id]) document.getElementById(id).value = parsed[id]; });
                } catch (e) {}
            }
        }

        function copyContent(elementId) {
            const el = document.getElementById(elementId);
            const selection = window.getSelection();
            const range = document.createRange();
            range.selectNodeContents(el);
            selection.removeAllRanges();
            selection.addRange(range);
            try {
                document.execCommand('copy');
                const successMsg = document.getElementById('copySuccessMsg');
                if (successMsg) {
                    successMsg.style.opacity = '1';
                    setTimeout(() => successMsg.style.opacity = '0', 2000);
                }
            } catch (err) {}
            selection.removeAllRanges();
        }
